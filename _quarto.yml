project: 
  type: book  
  output-dir: docs

book:
  title: "Desarrollo e Implementación con tecnologías libres de un Dispositivo Portátil para Evaluar el Confort Térmico, Lumínico y Acústico en Interiores"
  author: "José Ramón Hernández Aguilar"
  date: "12/25/2024"
  navbar:
    search: true
  sidebar:
    menu: true
    collapse-level: 1
    border: true
  chapters:
    - index.qmd
    - part: "Introducción"
      chapters: 
        - ./caps/introduccion/intro.qmd
    - part: "Marco Teórico"
      chapters: 
        - ./caps/marco/marco.qmd
    - part: "Metodología"
      chapters: 
        - ./caps/metodologia/metodologia.qmd
    - part: "Resultados"
      chapters: 
        - ./caps/resultados/resultados.qmd
    - part: "Discusión"
      chapters: 
        - ./caps/discusion/discusion.qmd
    - part: "Conclusiones"
      chapters: 
        - ./caps/conclusiones/conclusiones.qmd
    - part: "Referencias"
      chapters:
        - references.qmd
    - part: "Anexos"
      chapters:
        - anexos.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    code-link: true
  pdf:
    documentclass: scrreprt
